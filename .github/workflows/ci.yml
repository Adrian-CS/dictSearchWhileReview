name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile sources
        run: python3 -m compileall -q src/jisho_lookup

      - name: Build .ankiaddon
        run: python3 build.py

      - name: List dist/
        run: ls -la dist/
